name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign binary
        run: |
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/signing.keychain-db | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing with: $IDENTITY"
          codesign --force --options runtime \
            --sign "$IDENTITY" \
            --timestamp \
            target/${{ matrix.target }}/release/ax
          codesign --verify --verbose target/${{ matrix.target }}/release/ax

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip -j ax.zip target/${{ matrix.target }}/release/ax
          xcrun notarytool submit ax.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

      - uses: actions/upload-artifact@v4
        with:
          name: ax-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/ax

  universal:
    name: Universal Binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ax-x86_64-apple-darwin
          path: x86_64
      - uses: actions/download-artifact@v4
        with:
          name: ax-aarch64-apple-darwin
          path: aarch64
      - name: Create universal binary
        run: |
          chmod +x x86_64/ax aarch64/ax
          lipo -create -output ax x86_64/ax aarch64/ax
          lipo -info ax

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Sign universal binary
        run: |
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/signing.keychain-db | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Signing with: $IDENTITY"
          codesign --force --options runtime \
            --sign "$IDENTITY" \
            --timestamp \
            ax
          codesign --verify --verbose ax

      - name: Notarize universal binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip -j ax.zip ax
          xcrun notarytool submit ax.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

      - uses: actions/upload-artifact@v4
        with:
          name: ax-universal-apple-darwin
          path: ax

  upload-assets:
    name: Upload Release Assets
    needs: universal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ax-x86_64-apple-darwin
          path: ax-x86_64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: ax-aarch64-apple-darwin
          path: ax-aarch64-apple-darwin
      - uses: actions/download-artifact@v4
        with:
          name: ax-universal-apple-darwin
          path: ax-universal-apple-darwin
      - name: Package tarballs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x ax-x86_64-apple-darwin/ax ax-aarch64-apple-darwin/ax ax-universal-apple-darwin/ax
          tar czf "ax-${VERSION}-x86_64-apple-darwin.tar.gz" -C ax-x86_64-apple-darwin ax
          tar czf "ax-${VERSION}-aarch64-apple-darwin.tar.gz" -C ax-aarch64-apple-darwin ax
          tar czf "ax-${VERSION}-universal-apple-darwin.tar.gz" -C ax-universal-apple-darwin ax
          sha256sum ax-*.tar.gz > checksums-sha256.txt
          cat checksums-sha256.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ax-*.tar.gz
            checksums-sha256.txt

  update-homebrew:
    name: Update Homebrew Formula
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets to propagate
        run: sleep 10
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: ax
          homebrew-tap: watzon/homebrew-ax
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/watzon/ax-cli/releases/download/${{ github.ref_name }}/ax-${{ steps.version.outputs.version }}-universal-apple-darwin.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
